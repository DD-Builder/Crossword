<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbf7ee"/>
      <stop offset="1" stop-color="#ece2cc"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffdb4d"/>
      <stop offset="1" stop-color="#f5c518"/>
    </linearGradient>
    <filter id="lift" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1c1b18" flood-opacity="0.30"/>
    </filter>
    <clipPath id="rounded">
      <rect width="512" height="512" rx="96"/>
    </clipPath>
  </defs>

  <!-- warm paper ground -->
  <rect width="512" height="512" rx="96" fill="url(#paper)"/>

  <!-- crossword field: faint lattice with symmetric blocks -->
  <g clip-path="url(#rounded)">
    <g stroke="#1c1b18" stroke-opacity="0.14" stroke-width="4">
      <path d="M102.4 0V512M204.8 0V512M307.2 0V512M409.6 0V512"/>
      <path d="M0 102.4H512M0 204.8H512M0 307.2H512M0 409.6H512"/>
    </g>
    <g fill="#1c1b18" opacity="0.82">
      <rect x="0" y="0" width="102.4" height="102.4"/>
      <rect x="409.6" y="0" width="102.4" height="102.4"/>
      <rect x="0" y="409.6" width="102.4" height="102.4"/>
      <rect x="409.6" y="409.6" width="102.4" height="102.4"/>
      <rect x="204.8" y="0" width="102.4" height="102.4" opacity="0.16"/>
      <rect x="0" y="204.8" width="102.4" height="102.4" opacity="0.16"/>
    </g>
  </g>

  <!-- the cursor cell: a letterpress R mid-solve -->
  <g filter="url(#lift)">
    <rect x="132" y="132" width="248" height="248" rx="26" fill="url(#tile)" stroke="#1c1b18" stroke-width="13"/>
  </g>
  <text x="163" y="205" font-size="58" font-family="Georgia, 'DejaVu Serif', serif" font-weight="700" fill="#1c1b18">1</text>
  <text x="260" y="352" font-size="196" font-family="Georgia, 'DejaVu Serif', serif" font-weight="800" text-anchor="middle" fill="#1c1b18">R</text>
</svg>
